version: '3.8'

services:
  # Supabase Local Development
  supabase:
    image: supabase/supabase-dev:latest
    ports:
      - "54321:54321"
      - "54322:54322"
    environment:
      POSTGRES_PASSWORD: your-super-secret-and-long-postgres-password
      JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
    volumes:
      - supabase_data:/var/lib/postgresql/data
      - ./supabase:/supabase
    command: supabase start

  # Ganache for Local Blockchain Development
  ganache:
    image: trufflesuite/ganache-cli:latest
    ports:
      - "8545:8545"
    environment:
      - GANACHE_ACCOUNTS=10
      - GANACHE_DETERMINISTIC=true
      - GANACHE_MNEMONIC=test test test test test test test test test test test junk
      - GANACHE_PORT=8545
      - GANACHE_NETWORK_ID=1337
    command: ganache-cli --accounts 10 --deterministic --mnemonic "test test test test test test test test test test test junk" --port 8545 --network-id 1337

  # Redis for Caching and Session Storage
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # PostgreSQL for Additional Data (if needed)
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: medflect
      POSTGRES_USER: medflect
      POSTGRES_PASSWORD: medflect123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  supabase_data:
  redis_data:
  postgres_data: 